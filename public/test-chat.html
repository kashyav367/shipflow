<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRouter Chat Tester · ShipFlow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.08);
      --primary: #6366f1;
      --primary-glow: rgba(99,102,241,0.3);
      --text: #e8eaf0;
      --muted: #6b7280;
      --user-bubble: #6366f1;
      --ai-bubble: #1c2030;
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot.error   { background: var(--danger);  box-shadow: 0 0 6px var(--danger);  }
    .dot.loading { background: var(--warn);    animation: pulse 1s infinite; }

    /* ── Config bar ── */
    .config-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .config-bar label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .config-bar select,
    .config-bar input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .config-bar select { cursor: pointer; }
    .config-bar select:focus,
    .config-bar input[type="text"]:focus { border-color: var(--primary); }
    #apiKeyInput { flex: 1; min-width: 200px; font-family: monospace; }
    .btn-test {
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-test:hover { opacity: .85; }
    .btn-test:active { transform: scale(.96); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 760px;
      animation: fadeIn .25s ease;
    }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai   { align-self: flex-start; }
    .msg.system { align-self: center; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--user-bubble); }
    .msg.ai   .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: calc(100% - 44px);
    }
    .msg.user  .bubble { background: var(--user-bubble); color: #fff; border-radius: 16px 4px 16px 16px; }
    .msg.ai    .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
    .msg.system .bubble {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      display: flex; gap: 8px; align-items: center;
    }
    .msg.user .meta { justify-content: flex-end; }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge.ok   { background: rgba(16,185,129,.15); color: var(--success); }
    .badge.err  { background: rgba(239,68,68,.15);  color: var(--danger); }
    .badge.ms   { background: rgba(255,255,255,.06); color: var(--muted); }

    /* Typing indicator */
    .typing-bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .6;
      animation: bounce .9s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .3s; }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 44px;
      transition: border-color .2s;
      line-height: 1.5;
    }
    #userInput:focus { border-color: var(--primary); }
    #userInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover:not(:disabled) { opacity: .85; }
    .send-btn:active:not(:disabled) { transform: scale(.94); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }

    .clear-btn {
      width: 44px; height: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-7px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .4; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚀</div>
  <div>
    <h1>OpenRouter Chat Tester</h1>
    <p>ShipFlow AI · Direct API test</p>
  </div>
  <div class="status-dot" id="statusBadge">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Not tested</span>
  </div>
</header>

<div class="config-bar">
  <label>API Key</label>
  <input type="text" id="apiKeyInput" placeholder="sk-or-v1-... (paste your OpenRouter API key)" />

  <label>Model</label>
  <select id="modelSelect">
    <option value="anthropic/claude-sonnet-4">claude-sonnet-4</option>
    <option value="anthropic/claude-sonnet-4.5">claude-sonnet-4.5</option>
    <option value="anthropic/claude-sonnet-5">claude-sonnet-5</option>
    <option value="anthropic/claude-haiku-4.5">claude-haiku-4.5</option>
    <option value="anthropic/claude-opus-4">claude-opus-4</option>
    <option value="openai/gpt-4o">gpt-4o</option>
    <option value="openai/gpt-4o-mini">gpt-4o-mini</option>
    <option value="google/gemini-pro-1.5">gemini-pro-1.5</option>
    <option value="meta-llama/llama-3.1-8b-instruct">llama-3.1-8b</option>
  </select>

  <button class="btn-test" onclick="testConnection()">🔌 Test Connection</button>
</div>

<div id="messages">
  <div class="msg system">
    <div class="bubble">👋 Enter your API key, pick a model, and start chatting to verify OpenRouter is working.</div>
  </div>
</div>

<div class="input-bar">
  <textarea id="userInput" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button class="clear-btn" title="Clear chat" onclick="clearChat()">🗑️</button>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  const history = []; // [{role, content}]
  let isLoading = false;

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('userInput');
  const sendBtn     = document.getElementById('sendBtn');
  const statusDot   = document.getElementById('statusDot');
  const statusText  = document.getElementById('statusText');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Enter to send
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) sendMessage();
    }
  });

  // ── Helpers ────────────────────────────────────────────
  function getKey()   { return document.getElementById('apiKeyInput').value.trim(); }
  function getModel() { return document.getElementById('modelSelect').value; }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(state) {
    statusDot.className = 'dot ' + state;
    if (state === 'online')  statusText.textContent = 'Connected';
    if (state === 'error')   statusText.textContent = 'Error';
    if (state === 'loading') statusText.textContent = 'Testing…';
    if (state === '')        statusText.textContent = 'Not tested';
  }

  function addMessage(role, content, meta = null) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : role === 'ai' ? '🤖' : 'ℹ️';

    const right = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    right.appendChild(bubble);

    if (meta) {
      const metaEl = document.createElement('div');
      metaEl.className = 'meta';
      for (const [label, cls] of Object.entries(meta)) {
        const b = document.createElement('span');
        b.className = `badge ${cls}`;
        b.textContent = label;
        metaEl.appendChild(b);
      }
      right.appendChild(metaEl);
    }

    if (role === 'system') {
      wrap.appendChild(bubble);
    } else {
      wrap.appendChild(avatar);
      wrap.appendChild(right);
    }

    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    inputEl.disabled = v;
  }

  // ── Test connection ────────────────────────────────────
  async function testConnection() {
    const key = getKey();
    const model = getModel();
    if (!key) { alert('Please enter your API key first.'); return; }

    setStatus('loading');
    addMessage('system', `🔌 Testing connection to OpenRouter with model: ${model}…`);

    const t0 = Date.now();
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
          'HTTP-Referer': 'http://localhost:3000',
          'X-Title': 'ShipFlow AI Chat Tester',
        },
        body: JSON.stringify({
          model,
          max_tokens: 50,
          messages: [{ role: 'user', content: 'Reply with exactly: "OpenRouter is working! ✅"' }],
        }),
      });

      const data = await res.json();
      const ms = Date.now() - t0;

      if (!res.ok) {
        setStatus('error');
        addMessage('system', `❌ API Error ${res.status}: ${data?.error?.message || JSON.stringify(data)}`);
        return;
      }

      const reply = data.choices?.[0]?.message?.content || '(empty response)';
      setStatus('online');
      addMessage('system', `✅ Connection OK in ${ms}ms · Model: ${model}\nResponse: "${reply}"`);
    } catch (err) {
      setStatus('error');
      addMessage('system', `❌ Network error: ${err.message}`);
    }
  }

  // ── Send message ───────────────────────────────────────
  async function sendMessage() {
    const key   = getKey();
    const model = getModel();
    const text  = inputEl.value.trim();

    if (!text) return;
    if (!key)  { addMessage('system', '⚠️ Please enter your OpenRouter API key above.'); return; }

    // Add user message to history + UI
    history.push({ role: 'user', content: text });
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    setLoading(true);
    showTyping();

    const t0 = Date.now();
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
          'HTTP-Referer': 'http://localhost:3000',
          'X-Title': 'ShipFlow AI Chat Tester',
        },
        body: JSON.stringify({
          model,
          max_tokens: 1024,
          messages: history,
        }),
      });

      const data = await res.json();
      const ms = Date.now() - t0;
      removeTyping();

      if (!res.ok) {
        setStatus('error');
        const errMsg = data?.error?.message || JSON.stringify(data);
        addMessage('system', `❌ API Error ${res.status}: ${errMsg}`);
        history.pop(); // remove user msg that failed
        setLoading(false);
        return;
      }

      const aiText = data.choices?.[0]?.message?.content || '(empty response)';
      const usage  = data.usage;
      const tokens = usage ? `${usage.prompt_tokens}→${usage.completion_tokens} tokens` : '';

      history.push({ role: 'assistant', content: aiText });
      setStatus('online');

      addMessage('ai', aiText, {
        [`${ms}ms`]: 'ms',
        ...(tokens ? { [tokens]: 'ok' } : {}),
      });

    } catch (err) {
      removeTyping();
      setStatus('error');
      addMessage('system', `❌ Network error: ${err.message}`);
      history.pop();
    }

    setLoading(false);
    inputEl.focus();
  }

  // ── Clear chat ─────────────────────────────────────────
  function clearChat() {
    history.length = 0;
    messagesEl.innerHTML = '';
    addMessage('system', '🗑️ Chat cleared. History reset.');
    setStatus('');
  }

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
